services:
  process_media:
    build:
      context: .
      dockerfile: Dockerfile
    image: process_media
    container_name: process_media
    ports:
      - "8013:8013"
    volumes:
      # Mount functional code & directories (read-only for safety, logs are rw)
      - ./process_media.py:/app/process_media.py:ro
      - ./functionals:/app/functionals:ro
      - ./config:/app/config:ro
      - ./data:/app/data:rw
      - ./logs:/app/logs:rw
    environment:
      PYTHONPATH: /app
      HOST_DOCKER_INTERNAL: host.docker.internal
      # Docker CLI config for Windows:
      DOCKER_HOST: tcp://host.docker.internal:2375
      DOCKER_CMD: /usr/local/bin/docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      uv run uvicorn process_media:app
      --host 0.0.0.0
      --port 8013
      --log-level info
      --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped